# SNS自動同期用のCloudflare Worker設定です。
# Cloudflare Pages（サイト本体）とは別に、このディレクトリから
# `wrangler deploy` で個別にデプロイします。

name = "nobeoka-ugokasu-social-sync"
main = "social-sync.ts"
compatibility_date = "2026-07-01"

# 30分ごとに自動実行するCron Trigger
[triggers]
crons = ["*/30 * * * *"]

# 投稿キャッシュを保存するKV名前空間。
# 事前に `wrangler kv namespace create SOCIAL_POSTS_KV` を実行し、
# 発行されたidをここに設定してください。
# ※ Cloudflare PagesのFunctions側（サイト本体）でも、同じKV名前空間を
#   バインドする必要があります（Pages側はダッシュボードの
#   「Settings > Functions > KV namespace bindings」から設定してください）。
[[kv_namespaces]]
binding = "SOCIAL_POSTS_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# 秘密情報ではない設定値
[vars]
META_GRAPH_API_VERSION = "v21.0"
SOCIAL_POST_LIMIT = "12"

# 以下は秘密情報のため、このファイルには書き込まず、
# 次のコマンドで個別に登録してください（値の入力を求められます）。
#
#   wrangler secret put FACEBOOK_PAGE_ID
#   wrangler secret put FACEBOOK_PAGE_ACCESS_TOKEN
#   wrangler secret put INSTAGRAM_BUSINESS_ACCOUNT_ID
#   wrangler secret put INSTAGRAM_ACCESS_TOKEN
#   wrangler secret put SOCIAL_SYNC_SECRET
#
# FACEBOOK_PAGE_ID / INSTAGRAM_BUSINESS_ACCOUNT_ID は秘密情報ではありませんが、
# 管理を一箇所に集約するため、あえてsecretとして登録する運用にしています。
# [vars] に平文で追加しても動作します（お好みで変更してください）。
